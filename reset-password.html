<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set a New Password | HelipadUSA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root{
  --navy:#0b1a2e;--navy-mid:#112240;--navy-light:#1a3259;
  --gold:#c9a84c;--gold-light:#f0c96e;--gold-dim:#8a6e2f;
  --white:#ffffff;--off-white:#e8edf4;--muted:#8899aa;
  --danger:#e05555;--success:#3dba7c;
}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--off-white);min-height:100vh;}
.topbar{background:#060f1e;text-align:center;padding:6px 16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:.04em;}
nav{background:var(--navy-mid);border-bottom:2px solid var(--gold-dim);padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.nav-brand{display:flex;align-items:center;gap:10px;padding:12px 0;text-decoration:none;}
.nav-brand .heli-icon{font-size:26px;}
.nav-brand .site-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;}
.wrap{max-width:460px;margin:60px auto;padding:0 20px 80px;}
.card{background:var(--navy-mid);border:1px solid var(--navy-light);border-top:3px solid var(--gold);border-radius:6px;padding:36px 32px;}
.card h1{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--white);margin-bottom:6px;}
.card p.sub{font-size:14px;color:var(--muted);margin-bottom:26px;line-height:1.5;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.form-group label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.form-group input{background:var(--navy);border:1px solid var(--navy-light);border-radius:3px;color:var(--off-white);font-family:'Barlow',sans-serif;font-size:15px;padding:10px 12px;outline:none;width:100%;}
.form-group input:focus{border-color:var(--gold);}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:13px 28px;border-radius:3px;cursor:pointer;border:none;width:100%;text-decoration:none;display:inline-block;text-align:center;transition:all .15s;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-light);}
.btn:disabled{opacity:.55;cursor:not-allowed;}
.form-status{padding:14px 16px;border-radius:4px;font-size:14px;margin-top:14px;display:none;line-height:1.5;}
.form-status.success{background:rgba(61,186,124,.12);border:1px solid var(--success);color:var(--success);display:block;}
.form-status.error{background:rgba(224,85,85,.12);border:1px solid var(--danger);color:var(--danger);display:block;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(11,26,46,.3);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
footer{background:#060f1e;border-top:2px solid var(--gold-dim);padding:28px 20px;text-align:center;}
footer p{font-size:13px;color:var(--muted);}
footer a{color:var(--gold);text-decoration:none;}
</style>
</head>
<body>

<div class="topbar">🚁 America's #1 Helicopter Resource</div>
<nav><a class="nav-brand" href="https://helipadusa.com"><span class="heli-icon">🚁</span><span class="site-name">HelipadUSA</span></a></nav>

<div class="wrap">
  <div class="card">
    <h1>Set a New Password</h1>
    <p class="sub" id="rp-sub">Enter a new password for your account below.</p>

    <div id="reset-form">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="rp-password" placeholder="At least 6 characters" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="rp-password2" placeholder="Re-enter password" autocomplete="new-password" />
      </div>
      <button class="btn btn-gold" id="rp-btn" onclick="doPasswordUpdate()">Update Password</button>
      <div class="form-status" id="rp-status"></div>
    </div>
  </div>
</div>

<footer><p>© 2026 <strong style="color:#cce0f0;">HelipadUSA</strong> · <a href="mailto:helipadusa@yahoo.com">helipadusa@yahoo.com</a></p></footer>

<script>
const SUPABASE_URL = 'https://jjmbchgiocozfmywrhgo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VEts7rJyk3tGoysAAErRVg_4bEchQsy';

// Supabase redirects here with the recovery token in the URL "hash"
// (the part after #), e.g. #access_token=...&type=recovery
function getRecoveryToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  return params.get('access_token');
}

const recoveryToken = getRecoveryToken();

if (!recoveryToken) {
  document.getElementById('rp-sub').textContent = 'This password reset link is invalid or has expired.';
  document.getElementById('reset-form').innerHTML =
    '<a href="forgot-password.html" class="btn btn-gold">Request a New Link</a>';
}

async function doPasswordUpdate() {
  const password = document.getElementById('rp-password').value;
  const password2 = document.getElementById('rp-password2').value;
  const statusEl = document.getElementById('rp-status');
  statusEl.className = 'form-status'; statusEl.textContent = '';

  if (!password || !password2) {
    statusEl.className = 'form-status error';
    statusEl.textContent = '⚠️ Please fill in both fields.';
    return;
  }
  if (password.length < 6) {
    statusEl.className = 'form-status error';
    statusEl.textContent = '⚠️ Password must be at least 6 characters.';
    return;
  }
  if (password !== password2) {
    statusEl.className = 'form-status error';
    statusEl.textContent = '⚠️ Passwords do not match.';
    return;
  }

  const btn = document.getElementById('rp-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Updating...';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${recoveryToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || 'Could not update password.');

    statusEl.className = 'form-status success';
    statusEl.textContent = '✅ Password updated! You can now log in with your new password.';
    document.getElementById('reset-form').innerHTML =
      '<a href="login.html" class="btn btn-gold">Go to Log In</a>';

  } catch (err) {
    statusEl.className = 'form-status error';
    statusEl.textContent = '❌ ' + err.message;
    btn.disabled = false;
    btn.innerHTML = 'Update Password';
  }
}
</script>
</body>
</html>
