<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log In | HelipadUSA</title>
<meta name="description" content="Log in to your HelipadUSA seller account to manage your helicopter listings." />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root{
  --navy:#0b1a2e;--navy-mid:#112240;--navy-light:#1a3259;
  --gold:#c9a84c;--gold-light:#f0c96e;--gold-dim:#8a6e2f;
  --white:#ffffff;--off-white:#e8edf4;--muted:#8899aa;
  --danger:#e05555;--success:#3dba7c;
}
html{scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--off-white);min-height:100vh;}
.topbar{background:#060f1e;text-align:center;padding:6px 16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:.04em;}
.topbar a{color:var(--gold);text-decoration:none;}
nav{background:var(--navy-mid);border-bottom:2px solid var(--gold-dim);padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.nav-brand{display:flex;align-items:center;gap:10px;padding:12px 0;text-decoration:none;}
.nav-brand .heli-icon{font-size:26px;}
.nav-brand .site-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;}
.nav-links{display:flex;flex-wrap:wrap;gap:4px;padding:8px 0;}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--off-white);text-decoration:none;padding:5px 9px;border-radius:3px;transition:background .15s,color .15s;}
.nav-links a:hover{background:var(--navy-light);color:var(--gold);}
.wrap{max-width:460px;margin:60px auto;padding:0 20px 80px;}
.card{background:var(--navy-mid);border:1px solid var(--navy-light);border-top:3px solid var(--gold);border-radius:6px;padding:36px 32px;}
.card h1{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--white);margin-bottom:6px;}
.card p.sub{font-size:14px;color:var(--muted);margin-bottom:26px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.form-group label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.form-group input{background:var(--navy);border:1px solid var(--navy-light);border-radius:3px;color:var(--off-white);font-family:'Barlow',sans-serif;font-size:15px;padding:10px 12px;outline:none;width:100%;transition:border-color .15s;}
.form-group input:focus{border-color:var(--gold);}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:13px 28px;border-radius:3px;cursor:pointer;border:none;text-decoration:none;display:inline-block;transition:all .15s;width:100%;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-1px);}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
.form-status{padding:14px 16px;border-radius:4px;font-size:14px;margin-top:14px;display:none;line-height:1.5;}
.form-status.success{background:rgba(61,186,124,.12);border:1px solid var(--success);color:var(--success);display:block;}
.form-status.error{background:rgba(224,85,85,.12);border:1px solid var(--danger);color:var(--danger);display:block;}
.alt-link{margin-top:22px;text-align:center;font-size:14px;color:var(--muted);}
.alt-link a{color:var(--gold);text-decoration:none;font-weight:600;}
.alt-link a:hover{text-decoration:underline;}
.forgot-link{text-align:right;margin-top:-8px;margin-bottom:16px;}
.forgot-link a{font-size:13px;color:var(--muted);text-decoration:none;}
.forgot-link a:hover{color:var(--gold);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(11,26,46,.3);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
footer{background:#060f1e;border-top:2px solid var(--gold-dim);padding:28px 20px;text-align:center;}
footer p{font-size:13px;color:var(--muted);}
footer a{color:var(--gold);text-decoration:none;}
</style>
</head>
<body>

<div class="topbar">🚁 America's #1 Helicopter Resource &nbsp;|&nbsp; Advertise: <a href="mailto:helipadusa@yahoo.com">helipadusa@yahoo.com</a></div>

<nav>
  <a class="nav-brand" href="https://helipadusa.com"><span class="heli-icon">🚁</span><span class="site-name">HelipadUSA</span></a>
  <div class="nav-links">
    <a href="https://helipadusa.com">Home</a>
    <a href="helicopter-for-sale.html">For Sale</a>
    <a href="signup.html">Sign Up</a>
  </div>
</nav>

<div class="wrap">
  <div class="card">
    <h1>Seller Log In</h1>
    <p class="sub">Log in to post a helicopter for sale or manage your existing listings.</p>

    <div id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="li-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="li-password" placeholder="Your password" autocomplete="current-password" />
      </div>
      <div class="forgot-link"><a href="forgot-password.html">Forgot password?</a></div>
      <button class="btn btn-gold" id="li-btn" onclick="doLogin()">Log In</button>
      <div class="form-status" id="li-status"></div>
    </div>

    <div class="alt-link">Don't have an account? <a href="signup.html">Sign up free</a></div>
  </div>
</div>

<footer><p>© 2026 <strong style="color:#cce0f0;">HelipadUSA</strong> · <a href="mailto:helipadusa@yahoo.com">helipadusa@yahoo.com</a></p></footer>

<script>
const SUPABASE_URL = 'https://jjmbchgiocozfmywrhgo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VEts7rJyk3tGoysAAErRVg_4bEchQsy';

function getRedirectTarget() {
  const params = new URLSearchParams(window.location.search);
  return params.get('redirect') || 'my-listings.html';
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const password = document.getElementById('li-password').value;
  const statusEl = document.getElementById('li-status');
  statusEl.className = 'form-status'; statusEl.textContent = '';

  if (!email || !password) {
    statusEl.className = 'form-status error';
    statusEl.textContent = '⚠️ Please enter your email and password.';
    return;
  }

  const btn = document.getElementById('li-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Logging in...';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.msg || data.error_description || 'Invalid email or password.');
    }

    localStorage.setItem('heli_session', JSON.stringify({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      user: data.user
    }));

    statusEl.className = 'form-status success';
    statusEl.textContent = '✅ Logged in! Redirecting...';
    setTimeout(() => { window.location.href = getRedirectTarget(); }, 800);

  } catch (err) {
    statusEl.className = 'form-status error';
    statusEl.textContent = '❌ ' + err.message;
    btn.disabled = false;
    btn.innerHTML = 'Log In';
  }
}
</script>
</body>
</html>
